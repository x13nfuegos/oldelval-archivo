name: Update data from Dropbox and Vimeo

on:
  schedule:
    - cron: '0 6 * * *'   # diario a las 06:00 UTC (~03:00 ART)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate data.json (Dropbox)
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_TEAM_MEMBER_ID: ${{ secrets.DROPBOX_TEAM_MEMBER_ID }}
          DROPBOX_ROOT_PATH: ${{ secrets.DROPBOX_ROOT_PATH }}
        run: node scripts/generate-data.js

      - name: Generate vimeo.json
        continue-on-error: true
        env:
          VIMEO_TOKEN: ${{ secrets.VIMEO_TOKEN }}
        run: node scripts/generate-vimeo.js

      - name: Commit and push if changed
        run: |
          git config user.name "oldelval-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json vimeo.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh data from Dropbox and Vimeo"
            git push
          fi
